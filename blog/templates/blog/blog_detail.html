{% extends 'catalog/base.html' %}

{% block content %}
<div class="container mt-4">
    <h1>{{ post.title }}</h1>
    <p class="text-muted">Просмотров: {{ post.views_count }}</p>
    {% if post.preview %}
        <img src="{{ post.preview.url }}" class="img-fluid mb-3" alt="{{ post.title }}">
    {% endif %}
    <p>{{ post.content|linebreaks }}</p>
    <a href="{% url 'blog:update' post.pk %}" class="btn btn-warning">Редактировать</a>
    <a href="{% url 'blog:delete' post.pk %}" class="btn btn-danger">Удалить</a>
    <a href="{% url 'blog:list' %}" class="btn btn-secondary">Назад</a>
</div>
{% endblock %}
