{% extends 'catalog/base.html' %}

{% block content %}
<div class="container">
    <h1>Блог</h1>
    <a href="{% url 'blog:create' %}" class="btn btn-neon mb-3">Новая запись</a>
    <div class="row">
        {% for post in posts %}
        <div class="col-md-4">
            <div class="card mb-4">
                {% if post.preview %}
                    <img src="{{ post.preview.url }}" class="card-img-top" alt="{{ post.title }}">
                {% endif %}
                <div class="card-body">
                    <h5 class="card-title">{{ post.title }}</h5>
                    <p class="card-text">{{ post.content|truncatechars:100 }}</p>
                    <p class="text-muted">Просмотров: {{ post.views_count }}</p>
                    <a href="{% url 'blog:detail' post.pk %}" class="btn btn-primary">Читать</a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
