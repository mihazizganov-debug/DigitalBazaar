{% extends 'catalog/base.html' %}

{% block content %}
<div class="container mt-4">
    <h1>Категории товаров</h1>
    <ul class="list-group">
        {% for category in categories %}
            <li class="list-group-item">
                <a href="{% url 'catalog:category_products' category.id %}">{{ category.name }}</a>
            </li>
        {% endfor %}
    </ul>
</div>
{% endblock %}
