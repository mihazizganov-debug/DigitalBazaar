{% extends 'catalog/base.html' %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-6">
            {% if product.image %}
                <img src="{{ product.image.url }}" class="img-fluid" alt="{{ product.name }}">
            {% else %}
                <img src="https://via.placeholder.com/400x300?text=No+Image" class="img-fluid" alt="Нет изображения">
            {% endif %}
        </div>
        <div class="col-md-6">
            <h1>{{ product.name }}</h1>
            <p class="text-muted">Категория: {{ product.category.name }}</p>
            <p>{{ product.description }}</p>
            <h3 class="text-primary">$ {{ product.price }}</h3>
            <button class="btn btn-success mt-3">Купить</button>
            <br><br>
            <a href="{% url 'catalog:product_update' product.pk %}" class="btn btn-warning">✏️ Редактировать</a>
            <a href="{% url 'catalog:product_delete' product.pk %}" class="btn btn-danger">🗑️ Удалить</a>
            <a href="{% url 'catalog:home' %}" class="btn btn-secondary">← Назад</a>
        </div>
    </div>
</div>
{% endblock %}
